<!--
  CONTRACT — "notes" post. Filled by the backend, committed to
  src/content/posts/<id>.html. See writeup.html for the full rules.
  "notes" has no required extra fields (no diff eyebrow).
-->
<article class="post type-notes"
  data-id="{{id}}"
  data-type="notes"
  data-date="{{date}}"
  data-title="{{title}}"
  data-excerpt="{{excerpt}}"
  data-tags="{{tagsCsv}}">
  <a href="/" class="back-link">← log/</a>
  <div class="post-meta">
    <span>{{date}}</span>
    <span class="tag tag-type">notes</span>
  </div>
  <h1 class="post-title">{{title}}</h1>
  <div class="body">
    {{{body}}}
  </div>
  <div class="post-tags">{{#tags}}<span class="tag">{{.}}</span>{{/tags}}</div>
</article>
