<section class="hero">
  <div class="term">
    <div class="term-bar">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="term-title">{{term_title}}</span>
    </div>
    <div class="term-body">
      <div class="prompt"><span class="path">{{prompt_path}}</span> <span class="cmd">$ {{prompt_cmd}}</span></div>
      <h1>{{headline}}<span class="cursor"></span></h1>
      <div class="bio-line">
        {{bio}}
      </div>
    </div>
  </div>
</section>

<div class="section-label">ls log/</div>
{{#hasTags}}
<div class="filter-bar" id="filter-bar">
  <button class="chip active" data-tag="*">all</button>
  {{#tags}}<button class="chip" data-tag="{{.}}">{{.}}</button>{{/tags}}
</div>
{{/hasTags}}
<div class="feed">
{{#hasPosts}}
{{{feed}}}
{{/hasPosts}}
{{^hasPosts}}
<div class="state-msg">// no entries yet</div>
{{/hasPosts}}
</div>
