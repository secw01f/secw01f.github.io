name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual re-deploy without committing dist to the repo.
  workflow_dispatch:

# Least-privilege by default; the deploy job needs Pages + OIDC.
permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Builds the site and validates every post's metadata against the
      # schema. A malformed CMS PR fails here, before it can merge.
      # dist/ is produced here and uploaded as a Pages artifact — it is
      # never committed to the repo (gitignored).
      - run: npm run build

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    # Publish on merges to main and on manual workflow_dispatch.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
